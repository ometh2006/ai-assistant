name: Build AI Assistant APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:

      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: 🔧 Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 🔧 Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 7.5

      - name: 🔧 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 🔑 Inject API Key
        run: |
          sed -i 's/YOUR_GROQ_API_KEY_HERE/${{ secrets.GROQ_API_KEY }}/g' \
            app/src/main/java/com/aiassistant/GroqApiClient.java

      - name: 🔨 Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AI-Assistant-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: 📊 Show APK info
        run: |
          APK=app/build/outputs/apk/debug/app-debug.apk
          SIZE=$(du -sh $APK | cut -f1)
          echo "✅ Build successful! APK size: $SIZE"

name: Build AI Assistant APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # Also lets you manually trigger a build from GitHub website
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest   # ✅ FREE on GitHub Actions

    steps:

      # 1. Checkout your code
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      # 2. Set up Java 11 (required for Android Gradle)
      - name: ☕ Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      # 3. Cache Gradle to speed up future builds (avoids re-downloading)
      - name: 📦 Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      # 4. Make gradlew executable
      - name: 🔧 Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. Inject the Groq API key from GitHub Secrets (never hardcode it!)
      #    Go to: GitHub Repo → Settings → Secrets → Actions → New secret
      #    Name: GROQ_API_KEY   Value: gsk_xxxxxxxxxxxxxxxx
      - name: 🔑 Inject API Key
        run: |
          sed -i 's/YOUR_GROQ_API_KEY_HERE/${{ secrets.GROQ_API_KEY }}/g' \
            app/src/main/java/com/aiassistant/GroqApiClient.java

      # 6. Build the Debug APK
      - name: 🔨 Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 7. Upload APK as a downloadable artifact
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: AI-Assistant-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30   # Keep for 30 days, then auto-delete

      # 8. Show APK size in the build log
      - name: 📊 Show APK info
        run: |
          APK=app/build/outputs/apk/debug/app-debug.apk
          SIZE=$(du -sh $APK | cut -f1)
          echo "✅ Build successful!"
          echo "📱 APK size: $SIZE"
          echo "📂 Path: $APK"
